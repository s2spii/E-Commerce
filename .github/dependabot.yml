version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk updates to reduce PR noise.
      minor-and-patch:
        update-types: ['minor', 'patch']
    labels: ['dependencies']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels: ['ci']

  - package-ecosystem: docker
    directory: '/server'
    schedule:
      interval: weekly
